kind = "web"
previewPath = "/"
title = "Giftrix"
version = "1.0.0"
id = "artifacts/giftrix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19146

[services.development]
run = "pnpm --filter @workspace/giftrix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/giftrix", "run", "build" ]
publicDir = "artifacts/giftrix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19146"
BASE_PATH = "/"
